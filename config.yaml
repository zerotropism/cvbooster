model: 'llama3.2'
prompts:
  rank:
    default: >
      Analyze how well this CV matches the job description.
      Rate the match from 0 to 1 (0=no match, 1=perfect match) and explain why.

      Job Description:
      {job_description}

      CV:
      {cv_content}

      Respond in this exact format:
      Score: [your score between 0 and 1]
      Explanation: [your explanation in 2-3 sentences]
    custom: >
      You are an impartial, professional, and highly concise evaluator.
      Analyze how well this CV matches the job description.
      Rate the match from 0 to 1 (0=no match, 1=perfect match) and explain why with concrete and concise reasons.

      Job Description:
      {job_description}

      CV:
      {cv_content}

      Respond in this exact format:
      Score: [your score between 0 and 1]
      Explanation: [your explanation in 2-3 sentences with concrete and concise reasons]
  rewrite:
    default: >
      Rewrite this CV to better match the job description while keeping all information truthful.
      Optimize the wording, highlight relevant skills and experiences, and format the output in Markdown.

      Job Description:
      {job_description}

      Original CV:
      {cv_content}

      Please provide the rewritten CV in Markdown format.
    custom: >
      Rewrite this CV in Markdown format to better match the job description while keeping all information truthful.
      Optimize the wording, highlight relevant skills and experiences, and format the output in Markdown.
      Never create skills, responsibilities, or experiences that do not exist.
      Prioritize factual elements and clear alignment between the CVs and the job description.
      Favor clarity, conciseness, and consistency.
      Never overvalue simple phrasing or vague statements.

      Job Description:
      {job_description}

      Original CV:
      {cv_content}

      Provide the rewritten CV in Markdown format with nothing more than the markdown content.
      Do not include any additional text or explanations, nor your thought process or any reasoning at all.
      Do not put a title before the markdown content.